name: rpg_fitness
description: App RPG Fitness offline-first estilo Solo Leveling
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1

  # Database (Offline First)
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.9
  drift_dev: ^2.17.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
